# =============================================================================
# tmux2k — Ghostty color scheme
# =============================================================================

# — Square separators (no powerline glyphs) ———————————
set -g @tmux2k-show-powerline false

# — Base colors ———————————————————————————————————————
set -g @tmux2k-bg-main '#011423'
set -g @tmux2k-text '#CBE0F0'
set -g @tmux2k-bg-alt '#214969'
set -g @tmux2k-blue '#0FC5ED'
set -g @tmux2k-light-blue '#24EAF7'
set -g @tmux2k-red '#E52E2E'
set -g @tmux2k-green '#44FFB1'
set -g @tmux2k-yellow '#FFE073'
set -g @tmux2k-purple '#a277ff'
set -g @tmux2k-black '#011423'
set -g @tmux2k-white '#CBE0F0'
set -g @tmux2k-gray '#214969'

# — UI colors —————————————————————————————————————————
set -g @tmux2k-message-bg '#0FC5ED'
set -g @tmux2k-message-fg '#011423'
set -g @tmux2k-pane-border '#214969'
set -g @tmux2k-pane-active-border '#0FC5ED'
set -g @tmux2k-pane-border-bg '#011423'
set -g @tmux2k-pane-active-border-bg '#011423'
set -g @tmux2k-prefix-highlight '#E52E2E'

# — Plugins: minimal — p10k already shows cwd/git ————
set -g @tmux2k-left-plugins "session"
set -g @tmux2k-right-plugins "time"

set -g @tmux2k-session-colors "blue black"
set -g @tmux2k-time-colors "bg_alt white"
set -g @tmux2k-time-format "%H:%M  %d %b"

# — Window list: centered ————————————————————————————
set -g @tmux2k-window-list-alignment 'absolute-centre'
set -g @tmux2k-window-list-format '#I:#W'
set -g @tmux2k-window-list-compact true
