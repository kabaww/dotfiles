# =============================================================================
# PREFIX
# =============================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# GENERAL
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",ghostty:RGB,xterm-256color:RGB"

set -g mouse on
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on    # close window 2 of 3, window 3 becomes 2
set -g history-limit 10000
set -s escape-time 0          # no delay for neovim escape key
set -g focus-events on        # needed for neovim autoread

# =============================================================================
# KEYBINDS
# =============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Split panes - more intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation - arrow keys
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Pane resize - arrow keys with prefix
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# =============================================================================
# PROJECT LAYOUT
# =============================================================================
# Usage: prefix + P  → spawn project layout for current directory
bind P run-shell "~/.config/tmux/project-layout.sh"

# =============================================================================
# STATUS BAR
# =============================================================================
set -g status-position top
set -g status-interval 5
set -g status-style "bg=#011423,fg=#CBE0F0"

set -g status-left-length 30
set -g status-left "#{?client_prefix,#[bg=#E52E2E fg=#011423 bold] #S ,#[bg=#0FC5ED fg=#011423 bold] #S }#[default] "

set -g status-right "#[fg=#214969] %H:%M  %d %b "

set -g window-status-format "#[fg=#214969] #I:#W "
set -g window-status-current-format "#[bg=#214969,fg=#CBE0F0,bold] #I:#W "

set -g pane-border-style "fg=#214969"
set -g pane-active-border-style "fg=#0FC5ED"
set -g message-style "bg=#0FC5ED,fg=#011423"
