# =============================================================================
# PREFIX
# =============================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# =============================================================================
# GENERAL
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",ghostty:RGB,xterm-256color:RGB"

set -g mouse on
set -g base-index 1           # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on    # close window 2 of 3, window 3 becomes 2
set -g history-limit 10000
set -s escape-time 0          # no delay for neovim escape key
set -g focus-events on        # needed for neovim autoread

# =============================================================================
# KEYBINDS
# =============================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Split panes - more intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Pane navigation - arrow keys
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Pane resize - arrow keys with prefix
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Window navigation
bind -n M-H previous-window
bind -n M-L next-window

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# =============================================================================
# PROJECT LAYOUT
# =============================================================================
# Usage: prefix + P  → spawn project layout for current directory
bind P run-shell "~/.config/tmux/project-layout.sh"

# =============================================================================
# STATUS BAR (tmux2k — config in separate file)
# =============================================================================
set -g status-position top
source-file ~/.config/tmux/tmux2k.conf


# =============================================================================
# PLUGINS
# =============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin '2kabhishek/tmux2k'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-capture-pane-contents 'on'
set -g @sessionx-bind 'K'

run '~/.config/tmux/plugins/tpm/tpm'
